project:
  title: "REPLACE_WITH_REVIEW_TITLE"
  description: "REPLACE_WITH_ONE_SENTENCE_REVIEW_PURPOSE"
  type: "narrative literature review"
  target_journal: "REPLACE_WITH_TARGET_JOURNAL_OR_UNDECIDED"
  target_word_count: "8000-12000"
  intended_audience: "REPLACE_WITH_PRIMARY_AUDIENCE"

paths:
  search_results: "search/pubmed_results.csv"
  ai_screened: "screening/ai_screened.csv"
  borderline_review: "screening/borderline_review.csv"
  final_screened: "screening/final_screened.csv"
  core_screened: "screening/core_screened.csv"
  abstracts_dir: "search/abstracts"
  pdf_dir: "pdfs"
  pdf_map: "pdfs/pdf_map.csv"
  extractions_dir: "extractions"
  nbib: "search/included_papers.nbib"

pubmed:
  retmax_per_query: 200
  date_filter: '("2019/01/01"[Date - Publication] : "2026/12/31"[Date - Publication])'
  variables:
    domain_terms: >-
      REPLACE_WITH_PUBMED_DOMAIN_TERMS
    method_terms: >-
      REPLACE_WITH_PUBMED_METHOD_OR_CONCEPT_TERMS
  queries:
    - name: "broad_topic"
      query: >-
        ({domain_terms}) AND ({method_terms}) AND {date_filter}
    - name: "review_guideline_background"
      query: >-
        ({domain_terms}) AND (review[Publication Type] OR guideline[Publication Type]
        OR review[Title/Abstract] OR guideline[Title/Abstract] OR consensus[Title/Abstract])
        AND {date_filter}
    - name: "translation_validation"
      query: >-
        ({domain_terms}) AND ({method_terms}) AND (validation[Title/Abstract]
        OR prospective[Title/Abstract] OR multicenter[Title/Abstract]
        OR "real-world"[Title/Abstract] OR clinical[Title/Abstract]) AND {date_filter}

screening:
  batch_size: 20
  default_model: "deepseek-chat"
  default_base_url: "https://api.deepseek.com"
  system_prompt: |-
    You are screening PubMed records for a narrative literature review.
    Topic: REPLACE_WITH_REVIEW_TOPIC_AND_BOUNDARIES.
    Return strict JSON only.

    Score 2 = Include. Meets any:
    - Directly addresses the configured topic and can support a major argument in the review.
    - Provides original evidence, a high-value review/guideline, or a useful conceptual framework.
    - Reports concrete outcomes, methods, datasets, cohorts, mechanisms, or translational barriers relevant to the topic.

    Score 1 = Borderline. Meets any:
    - Partially relevant to the topic or method but needs human judgment.
    - Useful background, adjacent field, landmark method, guideline, perspective, or review.
    - Relevant domain but weak method match, or relevant method but uncertain domain match.

    Score 0 = Exclude. Meets any:
    - Outside the configured topic boundaries.
    - Does not provide evidence, methods, concepts, or clinical context useful for the review.
    - Editorial/news/comment with little evidence value.

    For each record, return:
    {"PMID":"...", "Score":0|1|2, "Reason":"<=15 English words"}

core_selection:
  category_quotas:
    background_reviews_guidelines: 10
    mechanisms_or_methods: 12
    clinical_applications: 14
    validation_translation: 10
    implementation_ethics_policy: 6
  categories:
    - name: "validation_translation"
      terms:
        - "external validation"
        - "multicenter"
        - "multi-center"
        - "prospective"
        - "clinical trial"
        - "real-world"
        - "implementation"
    - name: "clinical_applications"
      terms:
        - "diagnosis"
        - "prognosis"
        - "prediction"
        - "treatment"
        - "therapy"
        - "screening"
        - "monitoring"
        - "clinical decision"
    - name: "mechanisms_or_methods"
      terms:
        - "machine learning"
        - "deep learning"
        - "model"
        - "framework"
        - "algorithm"
        - "omics"
        - "imaging"
        - "pathology"
        - "natural language processing"
        - "large language model"
    - name: "implementation_ethics_policy"
      terms:
        - "ethics"
        - "bias"
        - "fairness"
        - "explainable"
        - "interpretability"
        - "workflow"
        - "policy"
        - "regulation"
    - name: "background_reviews_guidelines"
      terms:
        - "review"
        - "guideline"
        - "consensus"
        - "practice guidance"
        - "perspective"
        - "position paper"
  default_category: "background_reviews_guidelines"
  high_value_journals:
    - "nature"
    - "science"
    - "cell"
    - "lancet"
    - "jama"
    - "nejm"
    - "bmj"
    - "npj"
    - "eclinicalmedicine"
  priority:
    year_weights:
      "2026": 7
      "2025": 6
      "2024": 5
      "2023": 3
      "2019-2022": 1
    review_terms:
      - "review"
      - "guideline"
      - "practice guidance"
      - "consensus"
      - "scoping review"
      - "position paper"
    validation_terms:
      - "external validation"
      - "multicenter"
      - "multi-center"
      - "prospective"
      - "clinical trial"
    explainability_terms:
      - "explainable"
      - "interpretability"
      - "transparent"
    multimodal_terms:
      - "multimodal"
      - "multi-modal"
      - "omics"
      - "imaging"
      - "pathology"
      - "clinical data"
    method_terms:
      - "artificial intelligence"
      - "machine learning"
      - "deep learning"
      - "large language model"
      - "natural language processing"

extraction:
  default_model: "deepseek-chat"
  default_base_url: "https://api.deepseek.com"
  source_text_chars: 7000
  system_prompt: |-
    You extract structured notes for a narrative literature review.
    Use only the supplied title, metadata, category, reason, and local source text.
    Do not invent quantitative values, dataset names, sample sizes, validation types, or architecture names.
    If a field is absent from the supplied text, write "not reported".
    Return strict JSON only with the requested keys.
  required_schema:
    short_title: "string"
    paper_type: "Original research / Review / Guideline / Perspective / Other"
    modalities_covered: "string"
    domain_context: "string"
    in_scope_score: "integer 1-3"
    framework_architecture: "string"
    key_techniques: "string"
    datasets_used: "string"
    validation_approach: "string"
    architecture_name: "string"
    validation_type: "internal / external / prospective / review / not reported"
    datasets_detail: "string"
    key_metrics: "string"
    key_findings:
      - "2-4 bullet strings"
    limitations: "string"
    review_sections: "string"
    key_claim_to_cite: "string"
    conflicting_findings: "string"
